services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://testboard:testboard@host.docker.internal:5432/testboard}
      REPORT_API_TOKEN: ${REPORT_API_TOKEN:-change-me}
      REPORT_STORAGE_DIR: ${REPORT_STORAGE_DIR:-var/reports}
      REPORT_MAX_UPLOAD_BYTES: ${REPORT_MAX_UPLOAD_BYTES:-20971520}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/var/reports:/app/var/reports

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "8080:80"
